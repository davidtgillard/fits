name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate AsyncAPI
        env:
          SUPPRESS_NO_CONFIG_WARNING: "1"
        run: npx --yes @asyncapi/cli@6.0.0 validate docs/asyncapi.yaml

      - name: Build
        run: zig build

      - name: ABI smoke tests
        run: zig build abi-test

      - name: Pull kcov image
        run: docker pull kcov/kcov:latest

      - name: Coverage
        env:
          FITS_NO_UPDATE_CHECK: "1"
          KCOV: ${{ github.workspace }}/tools/kcov
        run: |
          test -f tools/kcov || {
            echo "::error::tools/kcov is missing. Commit the tools/ directory (kcov wrapper and coverage-summary.py)."
            exit 1
          }
          chmod +x tools/kcov
          zig build coverage

      - name: Coverage summary
        run: python3 tools/coverage-summary.py zig-out/coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: zig-out/coverage/
          retention-days: 30
