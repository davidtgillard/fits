name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate AsyncAPI
        env:
          SUPPRESS_NO_CONFIG_WARNING: "1"
        run: npx --yes @asyncapi/cli@6.0.0 validate docs/asyncapi.yaml

      - name: Build
        run: zig build

      - name: Test
        env:
          FITS_NO_UPDATE_CHECK: "1"
        run: zig build test
