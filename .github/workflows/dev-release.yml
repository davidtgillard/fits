name: Dev Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Build release libraries
        run: |
          zig build -Doptimize=ReleaseSafe -Dcpu=x86_64

      - name: Create manifest
        run: |
          sha256=$(sha256sum zig-out/lib/libfits.a | cut -d' ' -f1)
          jq -n \
            --arg c "${{ github.sha }}" \
            --arg s "$sha256" \
            '{git_commit: $c, sha256: $s}' > manifest.json

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: dev
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            zig-out/lib/libfits.a
            zig-out/lib/libfits.so
            zig-out/include/fits_core.h
            zig-out/include/libfits.h
            zig-out/schemas/abi/*.schema.json
            manifest.json
